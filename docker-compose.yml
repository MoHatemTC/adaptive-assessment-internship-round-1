services:
  nginx:
    build: ./nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

  backend:
    build: ./backend
    env_file: .env
    depends_on:
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    restart: unless-stopped

  worker:
    profiles: ["worker"]
    build: ./backend
    command: celery -A app.workers.celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    environment:
      # Browser must call localhost; backend:8000 only works inside Docker network.
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_DEMO_ASSESSMENT_ID: a1b2c3d4-e5f6-4789-a012-3456789abcde
      BACKEND_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: masaar
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  pgdata:
