[tool.ruff]
line-length = 88
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I"]

[tool.pyright]
pythonVersion = "3.12"
typeCheckingMode = "basic"
reportMissingImports = false
reportMissingModuleSource = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
markers = [
    "deepeval: opt-in G-Eval LLM judge tests (set RUN_DEEPEVAL=1)",
    "integration: live external service tests",
]

[dependency-groups]
dev = [
    "alembic>=1.18.4",
    "asyncpg>=0.31.0",
    "celery>=5.6.3",
    "deepeval>=0.20.30",
    "deepgram-sdk>=7.3.1",
    "fastapi>=0.137.1",
    "httpx>=0.28.1",
    "langchain>=1.3.9",
    "langchain-community>=0.4.2",
    "langchain-litellm>=0.7.0",
    "langfuse>=4.9.0",
    "langgraph>=1.2.5",
    "langgraph-checkpoint-postgres>=3.1.0",
    "litellm>=1.89.1",
    "mypy>=2.1.0",
    "prometheus-client>=0.25.0",
    "psycopg[binary,pool]>=3.3.4",
    "pydantic>=2.13.4",
    "pydantic-settings>=2.14.1",
    "pyright>=1.1.410",
    "pytest>=9.1.0",
    "pytest-asyncio>=1.4.0",
    "python-jose[cryptography]>=3.5.0",
    "qdrant-client>=1.18.0",
    "redis>=8.0.0",
    "rich>=15.0.0",
    "ruff>=0.15.17",
    "slowapi>=0.1.10",
    "sqlalchemy>=2.0.51",
    "sqlmodel>=0.0.38",
    "structlog>=26.1.0",
    "tenacity>=9.1.4",
    "uvicorn>=0.49.0",
    "websockets>=15.0.1",
]
