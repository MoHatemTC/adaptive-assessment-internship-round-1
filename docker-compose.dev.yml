version: "3.9"

# Dev overrides — hot reload for backend and frontend
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  frontend:
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_BASE_URL: ""
      NEXT_PUBLIC_API_URL: ""
      BACKEND_URL: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
